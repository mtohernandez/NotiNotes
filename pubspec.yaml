name: noti_notes_app
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.2.4
  uuid: ^4.5.3
  string_similarity: ^2.1.1
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  material_tag_editor: ^0.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  gap: ^3.0.1
  board_datetime_picker: ^2.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15

flutter_native_splash:
  color: "#2D2D2D"
  image: "lib/assets/icons/app_icon.png"
  android: true
  ios: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icons/app_icon.png"
  adaptive_icon_background: "#2D2D2D"
  adaptive_icon_foreground: "lib/assets/icons/app_icon.png"


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - lib/assets/images/noProfilePicture.png
    - lib/assets/icons/plus.svg
    - lib/assets/icons/check.svg
    - lib/assets/icons/checkUnchecked.svg
    - lib/assets/icons/checkChecked.svg
    - lib/assets/icons/x.svg
    - lib/assets/icons/xFlat.svg
    - lib/assets/icons/hashtag.svg
    - lib/assets/icons/image.svg
    - lib/assets/icons/task.svg
    - lib/assets/icons/notification.svg
    - lib/assets/icons/user.svg
    - lib/assets/icons/mic.svg
    - lib/assets/icons/notedrop.svg
    - lib/assets/icons/camera.svg
    - lib/assets/icons/gallery.svg
    - lib/assets/icons/removeUser.svg
    - lib/assets/icons/brush.svg
    - lib/assets/icons/contentDisplay.svg
    - lib/assets/icons/imageDisplay.svg
    - lib/assets/icons/normalDisplay.svg
    - lib/assets/icons/todolistDisplay.svg
    - lib/assets/images/patterns/polygons.png
    - lib/assets/images/patterns/pureNoisePNG.png
    - lib/assets/images/patterns/splashesPNG.png
    - lib/assets/images/patterns/upScaleWavesPNG.png
    - lib/assets/images/patterns/wavesRegulatedPNG.png
    - lib/assets/images/patterns/wavesUnregulatedPNG.png
    - lib/assets/images/patterns/klaeidoscope.png
    

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: SF Pro Display
      fonts:
        - asset: lib/assets/fonts/SFProDisplay-Regular.ttf
        - asset: lib/assets/fonts/SFProDisplay-Bold.ttf
          weight: 700
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
